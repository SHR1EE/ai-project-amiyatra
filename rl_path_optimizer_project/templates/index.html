<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMIyatra - Amity Noida</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f4f7f6; margin: 0; padding: 30px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        
        /* Updated Main Brand Color for the Title */
        h1 { color: #f39c12; text-align: center; font-size: 2.5em; margin-bottom: 5px; text-shadow: 1px 1px 2px rgba(0,0,0,0.1); }
        
        .form-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 25px; }
        select, .primary-btn { padding: 12px; font-size: 16px; border-radius: 6px; border: 1px solid #ccd1d9; }
        
        .primary-btn { background-color: #27ae60; color: white; border: none; cursor: pointer; font-weight: bold; transition: 0.2s; margin-top: 10px; width: 100%; }
        .primary-btn:hover { background-color: #2ecc71; }
        
        .btn-group { display: flex; gap: 10px; margin-bottom: 10px; }
        .secondary-btn { background-color: #ecf0f1; color: #2c3e50; border: 1px solid #bdc3c7; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-size: 14px; transition: 0.2s; flex: 1; }
        .secondary-btn:hover { background-color: #bdc3c7; }

        .results { background: #ecf0f1; padding: 20px; border-radius: 8px; margin-bottom: 25px; }
        .route-step { display: inline-block; background: #34495e; color: white; padding: 5px 10px; border-radius: 4px; margin: 5px; font-size: 14px;}
        iframe { width: 100%; height: 500px; border: none; border-radius: 8px; border: 1px solid #bdc3c7; }
        
        .checkbox-group { 
            background: #fdfdfd; 
            padding: 15px; 
            border: 1px solid #ccd1d9; 
            border-radius: 6px; 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 10px; 
            max-height: 300px; 
            overflow-y: auto;
        }
        .checkbox-label { display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 14px; }
        .toggle-box { background: #e8f8f5; padding: 15px; border-radius: 6px; border: 1px solid #1abc9c; display: flex; align-items: center; gap: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📍 AMIyatra</h1>
        <p style="text-align: center; color: #7f8c8d;">Smart AI Routing & Traffic Optimizer for Amity NCR</p>
        
        <form method="POST">
            <div class="form-group">
                <label for="start_node"><strong>1. Select Starting Point:</strong></label>
                <select name="start_node" id="start_node">
                    {% for key, loc in locations.items() %}
                        <option value="{{ key }}">{{ loc.name }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label><strong>2. Select Stops to Visit:</strong></label>
                
                <div class="btn-group">
                    <button type="button" class="secondary-btn" id="selectAllBtn">Select All</button>
                    <button type="button" class="secondary-btn" id="deselectAllBtn">Deselect All</button>
                </div>

                <div class="checkbox-group">
                    {% for key, loc in locations.items() %}
                        <label class="checkbox-label">
                            <input type="checkbox" name="stops" value="{{ key }}" class="stop-checkbox"> 
                            {{ loc.name }}
                        </label>
                    {% endfor %}
                </div>
            </div>
            
            <div class="form-group">
                <div class="toggle-box">
                    <input type="checkbox" id="return_start" name="return_start" value="yes" checked style="width: 20px; height: 20px; cursor: pointer;">
                    <label for="return_start" style="cursor: pointer; font-weight: bold; color: #16a085;">Return to Starting Point (Closed Loop)</label>
                </div>
            </div>
            
            <button type="submit" class="primary-btn">Optimize Route</button>
        </form>

        {% if map_ready %}
            <div class="results">
                <h3>Optimal Sequence:</h3>
                <div>
                    {% for node in path %}
                        <span class="route-step">{{ node.name }}</span> 
                        {% if not loop.last %} ➔ {% endif %}
                    {% endfor %}
                </div>
            </div>
            
            <h3>Interactive Map</h3>
            <iframe src="{{ url_for('map_view') }}"></iframe>
        {% endif %}
    </div>

    <script>
        document.getElementById('selectAllBtn').addEventListener('click', function() {
            let checkboxes = document.querySelectorAll('.stop-checkbox');
            checkboxes.forEach(box => box.checked = true);
        });

        document.getElementById('deselectAllBtn').addEventListener('click', function() {
            let checkboxes = document.querySelectorAll('.stop-checkbox');
            checkboxes.forEach(box => box.checked = false);
        });
    </script>
</body>
</html>
